<div class="flex flex-col gap-5 items-center justify-center ">

 <div class="w-full">
  <form [formGroup]="userform" (ngSubmit)="createadminuser()" 
  class="search-form flex flex-col md:flex-row flex-wrap gap-3 bg-white p-4 rounded-lg shadow">

  <!-- Name -->
  <div class="flex-1">
    <input 
      class="w-full rounded px-3 py-2 border border-gray-300 " 
      type="text" name="name" id="name"
      formControlName="name"
      [ngClass]="{
        'is-invalid':
        (f.name.errors && f.name.touched) || (f.name.errors && submitted)
      }"
      placeholder="Full Name">
  </div>

  <!-- Phone -->
  <div class="flex-1">
    <input 
      class="w-full rounded px-3 py-2 border border-gray-300 " 
      type="text" name="phone" id="phone"
      formControlName="phone"
      [ngClass]="{
        'is-invalid':
        (f.phone.errors && f.phone.touched) || (f.phone.errors && submitted)
      }"
      placeholder="Phone Number">
  </div>
  <!-- Role Select -->
  <div class="flex-1">
    <select 
      class="w-full rounded px-3 py-2 border border-gray-300 "
      formControlName="role" [ngClass]="{
        'is-invalid':
        (f.role.errors && f.role.touched) || (f.role.errors && submitted)
      }">
      <option value="">Select Role</option>
      <option value="admin">Admin</option>
      <option value="moderator">Moderator</option>
    </select>
  </div>

  <!-- Submit Button -->
  <div class="flex-1 md:flex-none">
    <button 
      class="w-full md:w-auto px-4 py-2 text-white bg-blue-600 rounded hover:bg-blue-700 transition duration-200">
      {{this.f.id.value ? 'Update User' : 'Create User'}}
    </button>
  </div>

</form>
 </div>
  <div class="w-full flex flex-wrap lg:flex-nowrap gap-3">
    <form [formGroup]="searchform" (ngSubmit)="searchuser()" autocomplete="off" class="w-full flex flex-col gap-10">
      <input formControlName="phone" 
       [ngClass]="{
       'is-invalid':(ff.phone.errors && ff.phone.touched) ||
           (ff.phone.errors && submitted2)}"
           placeholder="Phone number"
           name="phone"
           id="phone"
           type="text"
           class=" flex-1 rounded border border-gray-300 px-4 py-2 "/>
    </form>
    <button (click)="searchuser()" class="w-full lg:w-50 bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700">Search</button>
    <button (click)="reset()" class="w-full lg:w-50 bg-gray-200 text-gray-700 px-5 py-2 rounded hover:bg-gray-300">Reset</button> 
  </div>
<div *ngIf="searchedUser" class="w-full flex flex-col sm:flex-row items-center sm:items-center justify-between gap-4 p-4 bg-blue-200 rounded border border-gray-200">

  <div class="flex flex-col sm:flex-row items-center sm:items-start gap-4">
     <img src="{{searchedUser?.image}}" alt=" " 
            class="bg-gray-50 w-20 h-20 rounded-full overflow-hidden border-2 border-gray-200 flex-shrink-0 "
            loading="lazy">  
    <div class="text-center sm:text-left">
      <h2 class="text-lg sm:text-xl font-semibold text-gray-800">{{ searchedUser?.name }}</h2>

      <p class="text-gray-600">Role: {{ searchedUser?.role }}</p>
