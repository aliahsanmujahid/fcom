<app-alert [title]="'Confirm'" [alert]="logAlert" (close)="logAlert = $event">
  <div class="w-full min-h-full p-3 flex flex-col items-center justify-between sm:justify-center ">
  <div class="sm:flex sm:items-start">
      <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-green-100 sm:mx-0 sm:h-10 sm:w-10">
          <svg class="h-6 w-6 text-green-600" stroke="currentColor" fill="none" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
      </div>
      <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
          <h3 class="text-gray-900">
            আপনি লগআউট করছেন! একবার লগআউট করলে,
            পুনরায় আপনার প্রোফাইল পেজ থেকে লগইন করতে হবে।
          </h3>
      </div>
  </div>
  <div class="w-full mt-10 sm:flex sm:flex-row-reverse">
      <span class="flex w-full rounded shadow-sm sm:ml-3 sm:w-auto">
          <button (click)="logout(true)" type="button"
              class="  cursor-pointer px-4 w-full rounded bg-blue-500 py-1.5 text-blue-50 hover:bg-blue-600 ">
              Confirm
          </button>
      </span>
  </div>
  </div>
</app-alert>
<div class="overflow-y-auto scrollbar-thin scrollbar-thumb-gray-700 scrollbar-track-gray-800 p-4 space-y-6 bg-gray-900 w-full h-full gap-1 flex flex-col justify-between ">
 <ul>
  <ng-container *ngFor="let item of sidebar" class="flex flex-col ">
    <li *ngIf="item?.show == true" class="transition-all cursor-pointer p-1.5 flex flex-row justify-between text-gray-500 rounded hover:bg-gray-800 hover:text-white"
        (click)="pathclick(item,true)" 
        [ngClass]="activeid == item.id ? ' text-white  ' : ' ' ">
          <div class="relative uppercase flex w-full items-center justify-start ">
            <svg *ngIf="activeid !== item.id" class="w-4 h-4 text-gray-300" aria-hidden="true"  width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7 7V5"/>
            </svg>
            <svg *ngIf="activeid == item.id" class="w-4 h-4 text-gray-300" aria-hidden="true"  width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14"/>
            </svg>
            <span class="ml-3">{{item.name}}</span>
            <span *ngIf="(item.id == 3 || item.id == 4 || item.id == 10 || item.id == 13 || item.id == 14) && (this.utlityService.livereportSource$ | async) as i" 
                  [ngClass]="{
        'text-red-500': (item.id == 3 ? i?.orders : item.id == 4 ? i.reviews : item.id == 10 ? i.products : item?.id == 13 ? i.questions : i.cart) <= 0,
        'text-green-500': (item.id == 3 ? i?.orders : item.id == 4 ? i.reviews : item.id == 10 ? i.products : item?.id == 13 ? i.questions : i.cart) >= 0,
        'absolute right-0 text-xs': true
      }">
                New ({{ item.id == 3 ? i?.orders : item.id == 4 ? i.reviews : item.id == 10 ? i.products : item?.id == 13 ? i.questions : i.cart }})
            </span>
          </div>  
    </li>
    <ul *ngIf="activeid == item?.id" class="text-xs w-full flex flex-col">
      <ng-container *ngFor="let s of item?.sub">
        <li *ngIf="s?.show == true" (click)="pathclick(s,false)" 
            [ngClass]="activeid2 == s.id ? ' text-white ' : ' text-gray-500' "
          class="rounded hover:bg-gray-800 uppercase flex gap-2 items-center justify-start w-full p-2 cursor-pointer">
          <span class="ml-7 bg-white p-0.5 rounded-full"></span>
          {{s.name}}
        </li>
      </ng-container>
    </ul>
  </ng-container>
</ul>
  <a (click)="logout(false)" class="w-full text-center p-1 text-red-500 border border-red-500 rounded hover:bg-red-500 hover:text-white transition">
    Logout
  </a>
</div>
