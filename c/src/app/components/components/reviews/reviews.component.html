<app-alert [size]="2" [title]=" 'Product review' " [alert]="(utlityService.getalert() == 'reviews')" (close)="utlityService.hidealert()">
  <div class="relative w-full flex flex-col items-start justify-start gap-3 p-3">
   <div class="w-full flex flex-col gap-3 ">
    <div *ngFor="let item of reviews; let i = index" [ngClass]="{'border-t border-gray-200': i !== 0}" class="w-full flex flex-col md:flex-row gap-5 ">
        <div class="flex flex-col gap-3 ">
          <div class="w-full flex gap-1 items-center text-[#EF4444] items-center justify-start " >
           <ng-container *ngFor="let star of [0, 1, 2, 3, 4]; let i = index">
            <ng-container *ngIf="1 >= i + 1; else halfOrEmpty">
          <svg fill="currentColor" class="w-4.5 h-4.5" viewBox="0 0 16 16">
            <path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"/>
          </svg>
        </ng-container>
        <ng-template #halfOrEmpty>
          <ng-container *ngIf="2 >= i + 0.5; else empty">
            <svg fill="currentColor" class="w-4.5 h-4.5" viewBox="0 0 16 16">
              <path d="M5.354 5.119 7.538.792A.52.52 0 0 1 8 .5c.183 0 .366.097.465.292l2.184 4.327 4.898.696A.54.54 0 0 1 16 6.32a.55.55 0 0 1-.17.445l-3.523 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256a.5.5 0 0 1-.146.05c-.342.06-.668-.254-.6-.642l.83-4.73L.173 6.765a.55.55 0 0 1-.172-.403.6.6 0 0 1 .085-.302.51.51 0 0 1 .37-.245zM8 12.027a.5.5 0 0 1 .232.056l3.686 1.894-.694-3.957a.56.56 0 0 1 .162-.505l2.907-2.77-4.052-.576a.53.53 0 0 1-.393-.288L8.001 2.223 8 2.226z"/>
            </svg>
          </ng-container>
          <ng-template #empty>
            <svg fill="none" stroke="currentColor" stroke-linecap="round"
             stroke-linejoin="round" stroke-width="2" class="w-4.5 h-4.5" viewBox="0 0 24 24">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
            </svg>
          </ng-template>
        </ng-template>
        </ng-container>
          </div>
         
      <div class="flex flex-col gap-0.5">
          <p class=" text-gray-800">
            {{item?.review ? item?.review : ' Not yet answered '}} 
          </p>
          <p *ngIf="item?.review" class="text-sm text-gray-400">{{item?.rby}} {{item?.date | date}}</p>
        </div>

        <div class="flex flex-col gap-0.5">
          <p class=" text-gray-800">
            {{item?.answer ? item?.answer : ' Not yet answered '}} 
          </p>
          <p *ngIf="item?.review" class="text-sm text-gray-400"> {{item?.ansdate | date}}</p>
        </div>
        </div>
    </div>
    </div>
  <div class="w-full">
    <app-button (click)="getallreviews()" 
       [class]=" 'w-full cursor-pointer rounded bg-blue-500 py-1.5 text-blue-50 hover:bg-blue-600 ' "
       [txt]=" nomorereview ? 'No more' : 'Load more' " [isloading]="loading">
    </app-button>
  </div>
  </div>
</app-alert>
