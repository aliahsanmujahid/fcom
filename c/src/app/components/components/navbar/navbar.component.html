
<div [ngClass]="((utlityService.getalert() == 'searchHint') || issearch || navpage) ? ' showdrop ' : '  ' " class=" backdrop " (mouseenter)="searchClick2()" (click)="searchClick2()" style="background-color: rgba(196, 196, 196, 0.341);" ></div>
<div class="rounded-b-lg bg-white cssshadow sticky top-0 left-0 z-[200] right-0">
<div class="rounded-b-lg sm:pl-3">
<header class="rounded-b-lg p-3 bg-white header w-full break-all text-justify ">
  <div class="flex items-center justify-between">
    <div class="flex items-center justify-start gap-7 ">
    <!-- logo part start-->
    <div *ngIf="!issearch" routerLink="/shop" class="p-1 cursor-pointer flex items-center justify-center">
     <img class="w-[80px] md:w-[90px] h-auto max-h-[30px]" src="{{ sitecontent?.logo}}" alt="">
    </div>
   <!-- logo part end -->
     <!-- menu sub menu part -->
    <div class="hidden lg:flex gap-3 items-center justify-center">
        <a routerLink="/offers" class="flex gap-1.5 items-center text-blue-500 cursor-pointer transition hover:text-blue-600">
        <span class="bg-blue-500 rounded-full p-1"></span>
        অফার
       </a>
       <a routerLink="/offers" class="flex gap-1.5 items-center text-blue-500 cursor-pointer transition hover:text-blue-600">
        <span class="bg-blue-500 rounded-full p-1"></span>
        রিভিউ
       </a>
       <a routerLink="/offers" class="flex gap-1.5 items-center text-blue-500 cursor-pointer transition hover:text-blue-600">
        <span class="bg-blue-500 rounded-full p-1"></span>
        প্রশ্ন
       </a>
    </div>
      <!-- menu sun menu part -->
    </div>
    <div [ngClass]="issearch ? ' w-full ' : ' '" class=" flex gap-5 items-center justify-between">
  <div [ngClass]="issearch ? ' block w-full ' : ' hidden sm:block '" class="  ">
    <form #SearchForm="ngForm" (ngSubmit)="searchProduct()" 
       autocomplete="off" class=" relative flex items-center">
       <input (change)="onInputChange($event)" (click)="searchHint()" #searchInput type="text" name="search"  id="search-box"
         value="{{ this.params?.search }}"
         placeholder="সার্চ প্রোডাক্ট" [ngClass]="issearch ? searchkeys.length > 0 ? ' w-full rounded-b-none ' : ' w-full ' : ' w-[250px] lg:w-[300px] '" 
         class=" bg-white pl-2 pr-6 py-1.5 border rounded border-gray-300" >
          <a class="absolute right-1 cursor-pointer " (click)="searchProduct()">
            <svg class="w-5 h-5" aria-hidden="true"  width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/>
            </svg>
        </a>
      <div *ngIf="((utlityService.getalert() == 'searchHint') || issearch) && searchkeys?.length > 0" class="border border-gray-200 z-[2000] p-3 sm:pl-5 absolute left-0 top-9 w-full lg:w-[300px] min-h-[350px] max-h-[350px] 
          sm:min-h-[320px] sm:max-h-[320px] bg-white " style="overflow-y: scroll;scrollbar-color: rgba(214, 214, 214, 0.753) rgb(255, 255, 255) !important; scrollbar-width: thin !important;">
        <div class="mb-5 w-full mx-auto h-[90%] flex gap-1 justify-center items-center flex-col">
          <ul *ngIf="searchkeys.length > 0" class="flex flex-col items-center justify-start w-full gap-5">
            <li *ngFor="let item of searchkeys" [ngClass]="params?.search == item ? ' font-bold ' : '  ' "
              (click)="searchkey(item,true)" class="flex rounded items-center justify-between w-full cursor-pointer hover:font-bold hover:text-gray-900">
              {{item}}
              <a (click)="deletekey(item)" class="flex items-center p-1.5 cursor-pointer text-red-400 bg-red-100">
                <svg class="w-2.5 h-2.5" aria-hidden="true"  fill="none" viewBox="0 0 14 14">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                </svg>
              </a>
            </li>
          </ul>
        </div>
       </div>
    </form>
  </div>
  <div *ngIf="!issearch" class="flex items-center gap-5">
    <a (click)="goCart()" [ngClass]="(basketService.basket$ | async) ? ' text-blue-500 border-blue-200 ' : ' border-gray-200 '" class="relative flex items-center justify-center sm:border rounded sm:p-2 cursor-pointer  " >
      <svg fill="currentColor" class="size-5.5" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M10.854 8.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 0 1 .708-.708L7.5 10.793l2.646-2.647a.5.5 0 0 1 .708 0"/>
        <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
      </svg>
      <span *ngIf="(basketService.basket$ | async)" class="absolute size-6 animate-ping rounded-full bg-sky-400 opacity-75"></span>
    </a>

    <a (click)="searchClick()" class="sm:hidden cursor-pointer ">
      <svg class="size-5.5" aria-hidden="true" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/>
      </svg>      
    </a>
    
    <div (click)="profileclick()" class="relative hidden sm:flex gap-1 items-center justify-center w-full py-1.5 px-3 rounded-l cursor-pointer mx-auto border border-r-10 text-blue-500 border-r-blue-500 border-blue-300 cursor-pointer">
        <span class="size-1.5 rounded-full bg-blue-500"></span>
        <span *ngIf="!(accountService.currentUser$ | async)">লগইন</span>
        <span *ngIf="(accountService.currentUser$ | async) as user">
         {{ user?.name?.split(' ')?.slice(0, 1)?.join(' ') }}
        </span>
    </div>
  </div>
    </div>
  </div>
</header>
</div>
</div>
